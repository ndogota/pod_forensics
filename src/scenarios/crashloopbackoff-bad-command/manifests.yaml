# crashloopbackoff-bad-command
#
# A Deployment whose container start command exits non-zero immediately. The
# kubelet restarts the container over and over, so the pod enters
# CrashLoopBackOff. This manifest is data for the capture step. It is never
# applied by the agent or the eval, which are read only.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: shop
  labels:
    app: checkout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      containers:
        - name: checkout
          image: ghcr.io/example/checkout:1.4.2
          # Bad start command. The process prints a fatal message and exits 1
          # right away because the required --config flag is missing, which
          # drives the pod into CrashLoopBackOff.
          command: ["/bin/sh", "-c"]
          args:
            - 'echo "FATAL: missing required flag --config"; exit 1'
          ports:
            - containerPort: 8080
